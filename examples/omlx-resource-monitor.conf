# omlx-resource-monitor — nginx server block
#
# Drop this file into your nginx conf.d / servers directory:
#   /opt/homebrew/etc/nginx/servers/omlx-resource-monitor.conf
#
# Then `nginx -t && nginx -s reload`.
#
# The block proxies oMLX (default :8000) through port 8443, adds a
# "Monitoring" tab to the admin navbar via sub_filter, and routes our
# own static assets + the logger's SSE stream.
#
# Edit the upstream / port at the top if your oMLX is not at the default.

server {
    listen 8443;
    server_name _;

    client_max_body_size 100m;

    # gzip for JSON / JS / CSS — sub_filter responses are not gzipped.
    gzip on;
    gzip_types application/json application/javascript text/css;
    gzip_min_length 1024;
    gzip_comp_level 5;

    # ── Internal auth check ─────────────────────────────────────────────────
    # Validates the caller's oMLX admin session cookie by hitting oMLX's
    # /admin/api/server-info. 200 = authenticated.
    location = /_omlx_auth {
        internal;
        proxy_pass http://127.0.0.1:8000/admin/api/server-info;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_set_header Host $host;
    }

    # 401 from auth_request → redirect to the admin login page.
    location @login_redirect {
        return 302 /admin;
    }

    # ── Static assets (panel.js, monitor.html if served via /custom/) ───────
    # Cache-Control: no-store so users always see the latest version.
    location /custom/ {
        auth_request /_omlx_auth;
        error_page 401 = @login_redirect;
        alias __INSTALL_DIR__/;
        autoindex off;
        add_header Cache-Control "no-store";
    }

    # ── Monitor page ────────────────────────────────────────────────────────
    location = /admin/monitor {
        auth_request /_omlx_auth;
        error_page 401 = @login_redirect;
        alias __INSTALL_DIR__/monitor.html;
        default_type text/html;
        add_header Cache-Control "no-cache";
    }

    # ── SSE stream (logger pushes here) ─────────────────────────────────────
    # Buffering must be off so each event reaches the browser immediately.
    location = /custom/stream {
        auth_request /_omlx_auth;
        error_page 401 = @login_redirect;
        proxy_pass http://127.0.0.1:9091/stream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 24h;
        gzip off;
        chunked_transfer_encoding off;
    }

    # ── Debug state dump (curl … | jq) ──────────────────────────────────────
    location = /custom/state {
        auth_request /_omlx_auth;
        error_page 401 = @login_redirect;
        proxy_pass http://127.0.0.1:9091/state;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # ── Everything else → oMLX, with two sub_filter injections ──────────────
    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE / long polls
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 1h;

        # WebSocket upgrade (some admin paths may use it)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # sub_filter doesn't work on gzipped responses → ask oMLX to not gzip.
        proxy_set_header Accept-Encoding "";

        # 1. Inject a "Monitoring" tab between Status and Models in the navbar.
        #    The anchor matches the Models dropdown wrapper opening div.
        sub_filter '<div class="relative" @mouseenter="modelsDropdown = true"'
                   '<a href="/admin/monitor" class="px-4 py-1.5 rounded-full text-sm font-medium transition-all duration-200 flex items-center gap-1.5 text-neutral-600 hover:text-neutral-900 no-underline" style="text-decoration:none;white-space:nowrap"><i data-lucide="activity" class="w-4 h-4"></i>Monitoring</a><div class="relative" @mouseenter="modelsDropdown = true"';

        # 2. Force navbar pill buttons / links to nowrap so the added tab
        #    doesn't push lines apart.
        sub_filter '</head>'
                   '<style>nav .bg-neutral-100.rounded-full button,nav .bg-neutral-100.rounded-full a{white-space:nowrap}</style></head>';

        sub_filter_once on;
    }
}
